<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ChiliCare Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid p-0"><div class="row g-0">
        <aside class="col-md-2 sidebar">
            <div class="brand-box text-center"><h3 class="m-0 fw-bold">CHILICARE</h3></div>
            <nav class="nav flex-column">
                <a href="index.html" class="nav-link active"><i class="bi bi-grid-fill"></i> Dashboard</a>
                <a href="users.html" class="nav-link"><i class="bi bi-people-fill"></i> Kelola User</a>
                <a href="encyclopedia.html" class="nav-link"><i class="bi bi-book-half"></i> Ensiklopedia</a>
                <a href="#" class="nav-link text-dark mt-5"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </nav>
        </aside>
        <main class="col-md-10 p-5">
            <h1 class="fw-bold display-5 mb-2">Halo, Admin! 👋</h1>
            <p class="text-secondary mb-5 fs-5">Monitor perkembangan ekosistem ChiliCare Anda hari ini.</p>
            <div class="row g-4">
                <div class="col-md-4"><div class="pop-card">
                    <div class="stat-icon bg-info"><i class="bi bi-people"></i></div>
                    <h5 class="text-secondary fw-bold">Total Petani</h5>
                    <h1 class="display-4 fw-bold" id="count-user">0</h1>
                </div></div>
                <div class="col-md-4"><div class="pop-card" style="background-color: var(--mint);">
                    <div class="stat-icon bg-white"><i class="bi bi-camera"></i></div>
                    <h5 class="fw-bold">Total Scan</h5>
                    <h1 class="display-4 fw-bold" id="count-scan">0</h1>
                </div></div>
                <div class="col-md-4"><div class="pop-card" style="background-color: var(--sky);">
                    <div class="stat-icon bg-white"><i class="bi bi-virus"></i></div>
                    <h5 class="fw-bold">Penyakit</h5>
                    <h1 class="display-4 fw-bold" id="count-disease">0</h1>
                </div></div>
            </div>
        </main>
    </div></div>
    <script src="js/api.js"></script>
    <script>
        async function load() {
            const data = await apiRequest("/stats");
            document.getElementById('count-user').innerText = data.total_users;
            document.getElementById('count-scan').innerText = data.total_scans;
            document.getElementById('count-disease').innerText = data.total_diseases;
        }
        load();
    </script>
</body>
</html>
