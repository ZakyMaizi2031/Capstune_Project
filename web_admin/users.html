<!DOCTYPE html>
<html lang="id">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <title>ChiliCare - Kelola User</title>
</head>
<body>
    <div class="container-fluid p-0"><div class="row g-0">
        <aside class="col-md-2 sidebar">
            <div class="brand-box text-center"><h3 class="m-0 fw-bold">CHILICARE</h3></div>
            <nav class="nav flex-column">
                <a href="index.html" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
                <a href="users.html" class="nav-link active"><i class="bi bi-people-fill"></i> Kelola User</a>
                <a href="encyclopedia.html" class="nav-link"><i class="bi bi-book-half"></i> Ensiklopedia</a>
            </nav>
        </aside>
        <main class="col-md-10 p-5">
            <h1 class="fw-bold mb-5">Manajemen Pengguna 👥</h1>
            <div class="table-container shadow">
                <table class="table m-0">
                    <thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr></thead>
                    <tbody id="user-body"></tbody>
                </table>
            </div>
        </main>
    </div></div>
    <script src="js/api.js"></script>
    <script>
        async function load() {
            const users = await apiRequest("/users");
            const body = document.getElementById('user-body');
            body.innerHTML = users.map(u => `
                <tr>
                    <td class="fw-bold">${u.nama_lengkap}</td>
                    <td>${u.email}</td>
                    <td><span class="badge bg-dark">${u.role.toUpperCase()}</span></td>
                    <td><button onclick="delUser(${u.id_user})" class="btn btn-danger btn-sm fw-bold">Hapus</button></td>
                </tr>
            `).join('');
        }
        async function delUser(id) {
            if(confirm("Hapus user ini?")) { await apiRequest(`/users/${id}`, "DELETE"); load(); }
        }
        load();
    </script>
</body>
</html>
